services:
  - type: web
    name: worksi
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@worksi.net
      - key: ADMIN_PASSWORD
        sync: false # set this in the Render dashboard before first deploy
      - key: DATABASE_URL
        value: file:/data/worksi.db
    disk:
      name: worksi-data
      mountPath: /data
      sizeGB: 1
